name: .NET

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: List files (debug)
      run: ls -R

    - name: Restore dependencies
      run: dotnet restore ./hotel.sln  

    - name: Build
      run: dotnet build ./hotel.sln --no-restore

    - name: Test
      run: dotnet test ./hotel.sln --no-build --verbosity normal